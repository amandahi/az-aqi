<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arizona AQI</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root { --bg:#07061a; --card-bg:rgba(255,255,255,0.045); --card-border:rgba(255,255,255,0.085); --text:#ede8ff; --muted:rgba(255,255,255,0.36); }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:
  radial-gradient(ellipse 80% 45% at 10% -5%,rgba(110,50,200,.3) 0%,transparent 65%),
  radial-gradient(ellipse 55% 35% at 90% 0%,rgba(210,85,15,.25) 0%,transparent 60%),
  radial-gradient(ellipse 50% 50% at 50% 105%,rgba(6,182,212,.09) 0%,transparent 70%);
  pointer-events:none; z-index:0; }
.mountains { position:fixed; bottom:0; left:0; right:0; pointer-events:none; z-index:0; opacity:.048; }
header { position:sticky; top:0; z-index:20; padding:16px 32px 14px; background:rgba(7,6,26,.76); backdrop-filter:blur(28px) saturate(1.5); -webkit-backdrop-filter:blur(28px) saturate(1.5); border-bottom:1px solid rgba(255,255,255,.055); }
.header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-icon { width:44px; height:44px; flex-shrink:0; }
.brand-text h1 { font-size:1.65rem; font-weight:800; letter-spacing:-.7px; background:linear-gradient(118deg,#fbbf24 0%,#f97316 42%,#22d3ee 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; }
.brand-text .sub { font-size:.7rem; color:var(--muted); letter-spacing:.5px; margin-top:3px; }
.header-right { display:flex; flex-direction:column; align-items:flex-end; gap:9px; }
.updated { font-size:.74rem; color:var(--muted); }
.controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.pill-group { display:flex; background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.1); border-radius:100px; padding:3px; gap:2px; }
.pill-btn { padding:5px 16px; border-radius:100px; border:none; background:transparent; color:rgba(255,255,255,.45); font-size:.8rem; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; }
.pill-btn:hover { color:rgba(255,255,255,.8); }
.pill-btn.active { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; box-shadow:0 2px 14px rgba(249,115,22,.5); }
.pill-btn.view-active { background:rgba(255,255,255,.12); color:#fff; }
.refresh-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:50%; width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.55); transition:all .2s; flex-shrink:0; }
.refresh-btn:hover { background:rgba(255,255,255,.11); color:rgba(255,255,255,.85); }
.refresh-btn svg { transition:transform .55s ease-in-out; }
.refresh-btn.spinning svg { transform:rotate(360deg); }
main { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 32px 52px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:16px; }
#best-run-box { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:2000; width:calc(100% - 32px); max-width:440px; }
.best-run-inner { background:rgba(16,185,129,.07); border:1px solid rgba(16,185,129,.22); border-radius:16px; padding:14px 20px; display:flex; align-items:center; gap:16px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
.best-run-label { font-size:.62rem; letter-spacing:.7px; color:rgba(16,185,129,.85); text-transform:uppercase; font-weight:700; margin-bottom:3px; }
.best-run-name { font-size:1rem; font-weight:700; color:#ede8ff; }
.best-run-aqi-wrap { text-align:right; flex-shrink:0; }
.best-run-num { font-size:2.2rem; font-weight:700; line-height:1; letter-spacing:-1px; }
.best-run-lbl { font-size:.6rem; text-transform:uppercase; letter-spacing:.8px; margin-top:3px; }
#mapbox { display:none; height:560px; border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,.08); box-shadow:0 6px 30px rgba(0,0,0,.4); }
#mapbox.active { display:block; }
.card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:22px; padding:18px 20px 14px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 6px 28px rgba(0,0,0,.36); transition:transform .18s,box-shadow .18s; }
.card:hover { transform:translateY(-3px); box-shadow:0 1px 0 rgba(255,255,255,.09) inset,0 14px 40px rgba(0,0,0,.5); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.station-name { font-size:.93rem; font-weight:600; color:#ece8ff; }
.station-meta { display:flex; align-items:center; gap:6px; margin-top:4px; }
.station-dist { font-size:.68rem; color:var(--muted); }
.badge { display:inline-flex; padding:2px 7px; border-radius:4px; font-size:.58rem; font-weight:700; letter-spacing:.6px; text-transform:uppercase; }
.badge-epa { background:rgba(34,197,94,.15); color:#4ade80; }
.badge-pa { background:rgba(168,85,247,.15); color:#c084fc; }
.aqi-now { text-align:right; }
.aqi-num { font-size:2.1rem; font-weight:700; line-height:1; letter-spacing:-1.5px; }
.aqi-lbl { font-size:.6rem; text-transform:uppercase; letter-spacing:.9px; margin-top:3px; opacity:.88; }
.aqi-param { font-size:.62rem; color:var(--muted); margin-top:2px; }
.chart-wrap { background:rgba(0,0,0,.22); border-radius:12px; padding:8px 4px 2px; overflow:hidden; }
.state-box { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:260px; gap:14px; color:var(--muted); grid-column:1/-1; }
.spinner { width:32px; height:32px; border:2.5px solid rgba(255,255,255,.07); border-top-color:#f59e0b; border-radius:50%; animation:spin .72s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.err-box { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-radius:14px; padding:16px 20px; color:#fca5a5; font-size:.875rem; grid-column:1/-1; }
.legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; padding:12px 16px; background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.055); border-radius:14px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:.68rem; color:var(--muted); }
.legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
/* Leaflet overrides */
.leaflet-container { background:#0d0c22; font-family:inherit; }
.leaflet-popup-content-wrapper { background:rgba(10,9,26,.97)!important; border:1px solid rgba(255,255,255,.11)!important; border-radius:14px!important; box-shadow:0 8px 32px rgba(0,0,0,.65)!important; }
.leaflet-popup-tip { background:rgba(10,9,26,.97)!important; }
.leaflet-popup-close-button { color:rgba(255,255,255,.4)!important; }
.leaflet-popup-content { color:#ede8ff; margin:12px 15px!important; }
.mp-name { font-weight:700; font-size:.9rem; margin-bottom:6px; }
.mp-aqi { font-size:1.5rem; font-weight:700; line-height:1; }
.mp-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.7px; margin-bottom:4px; opacity:.85; }
.mp-meta { font-size:.7rem; color:rgba(255,255,255,.42); }
/* Tooltip */
#tip { position:fixed; display:none; z-index:9999; pointer-events:none; background:rgba(10,9,26,.95); border:1px solid rgba(255,255,255,.13); border-radius:8px; padding:6px 11px; font-size:.76rem; color:#ede8ff; box-shadow:0 4px 20px rgba(0,0,0,.55); white-space:nowrap; }
@media (max-width:640px) { header{padding:12px 14px;} main{padding:16px 12px 40px;} .brand-text h1{font-size:1.25rem;} .pill-btn{padding:5px 12px;font-size:.76rem;} }
</style>
</head>
<body>

<svg class="mountains" viewBox="0 0 1440 220" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">

</svg>

<div id="tip"></div>

<header>
  <div class="header-inner">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="37" cy="9" r="5.5" fill="#fbbf24"/>
        <line x1="37" y1="1" x2="37" y2="2.8" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="37" y1="15.2" x2="37" y2="17" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="29.2" y1="9" x2="31" y2="9" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="43" y1="9" x2="44.8" y2="9" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="31.5" y1="3.5" x2="32.8" y2="4.8" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="41.2" y1="13.2" x2="42.5" y2="14.5" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="42.5" y1="3.5" x2="41.2" y2="4.8" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="31.5" y1="14.5" x2="32.8" y2="13.2" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
        <rect x="17" y="11" width="8" height="31" rx="4" fill="#10b981"/>
        <rect x="20" y="13" width="2.5" height="16" rx="1.25" fill="rgba(255,255,255,0.28)"/>
        <rect x="8" y="20" width="10" height="5.5" rx="2.75" fill="#10b981"/>
        <rect x="8" y="14" width="5.5" height="11" rx="2.75" fill="#10b981"/>
        <rect x="24" y="16" width="10" height="5.5" rx="2.75" fill="#10b981"/>
        <rect x="29" y="10.5" width="5.5" height="11" rx="2.75" fill="#10b981"/>
      </svg>
      <div class="brand-text">
        <h1>Arizona AQI</h1>
        <div class="sub">Flagstaff and Surrounding Stations</div>
      </div>
    </div>
    <div class="header-right">
      <div class="updated" id="updated">Loading&hellip;</div>
      <div class="controls">
        <button class="refresh-btn" id="refresh-btn" title="Refresh data" onclick="refreshData()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M13 7.5A5.5 5.5 0 1 1 7.5 2c1.5 0 2.85.6 3.84 1.57L13 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 2v3H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="pill-group" id="view-group">
          <button class="pill-btn" data-view="charts">Charts</button>
          <button class="pill-btn view-active" data-view="map">Map</button>

          <button class="pill-btn active" data-period="24h">24 Hours</button>

</header>

<main>
  <div class="grid" id="grid" style="display:none"></div>
  <div id="map-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;color:rgba(255,255,255,.36)"><div class="spinner"></div><span>Fetching air quality data&hellip;</span></div>
  <div id="best-run-box">
    <div class="best-run-inner">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
        </defs>
        <circle cx="28" cy="7" r="3.5" fill="url(#rg)"/>
        <line x1="26" y1="10" x2="20" y2="20" stroke="url(#rg)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M24 15 L30 18" stroke="url(#rg)" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 14 L16 11" stroke="url(#rg)" stroke-width="2" stroke-linecap="round"/>
        <path d="M20 20 L26 27 L29 33" stroke="url(#rg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 20 L14 26 L11 33" stroke="url(#rg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div style="flex:1">
        <div class="best-run-label">Best Place to Run</div>
        <div class="best-run-name" id="best-run-name">—</div>
      </div>
      <div class="best-run-aqi-wrap">
        <div class="best-run-num" id="best-run-num">—</div>
        <div class="best-run-lbl" id="best-run-lbl">—</div>
      </div>
    </div>
  </div>
  <div id="mapbox" class="active"></div>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Good (0-50)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Moderate (51-100)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Sensitive (101-150)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Unhealthy (151-200)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Very Unhealthy (201-300)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7f1d1d"></div>Hazardous (301+)</div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const FN  = 'https://nfvswvrcquvnfcbuebmn.supabase.co/functions/v1/az-air-quality';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mdnN3dnJjcXV2bmZjYnVlYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTMyNTIsImV4cCI6MjA5ODQyOTI1Mn0.uV3Of4heAbEa1RRUkRrCQu756nkrbgxCi9Hi_mAoYMc';
const FLAGSTAFF = [35.1983, -111.6513];

// Friends' home locations (geocoded via OpenStreetMap Nominatim)
const FRIENDS = [
  { name: 'Amanda', lat: 35.1868, lon: -111.6981, color: '#f97316' },
  { name: 'Mia',    lat: 35.1585, lon: -111.6697, color: '#a855f7' },
  { name: 'Kylie',  lat: 35.1723, lon: -111.6794, color: '#22d3ee' },
];

let period = '24h', view = 'map';
const cache = {};
let leafletMap = null, markers = [];
let windData = null;

const LEVELS = [
  [50,'#22c55e','Good'],[100,'#eab308','Moderate'],[150,'#f97316','Sensitive'],
  [200,'#ef4444','Unhealthy'],[300,'#a855f7','Very Unhealthy'],[Infinity,'#7f1d1d','Hazardous'],
];
const aqiColor = v => { for(const[m,c]of LEVELS) if(v<=m) return c; return '#7f1d1d'; };
const aqiLabel = v => { for(const[m,,l]of LEVELS) if(v<=m) return l; return 'Hazardous'; };

function bucket(readings, p) {
  const now = Date.now();
  const [slotMs,n] = p==='7d'?[86400e3,7]:p==='3d'?[21600e3,12]:[3600e3,24];
  const slots = Array.from({length:n},(_,i)=>{
    const end=now-(n-1-i)*slotMs; return{start:end-slotMs,end,vals:[],max:null};
  });
  for(const r of readings){
    const t=new Date(r.time+'Z').getTime();
    for(const s of slots){if(t>=s.start&&t<s.end){s.vals.push(r.aqi);break;}}
  }
  for(const s of slots) if(s.vals.length) s.max=Math.max(...s.vals);
  return slots;
}

function slotLabel(ts,p,long=false){
  const d=new Date(ts);
  if(p==='7d') return d.toLocaleDateString('en-US',{weekday:long?'short':undefined,month:'short',day:'numeric',timeZone:'America/Phoenix'});
  if(long) return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Phoenix'});
  return d.toLocaleTimeString('en-US',{hour:'numeric',hour12:true,timeZone:'America/Phoenix'});
}

function latestAQI(readings){
  if(!readings.length) return{aqi:null,param:null};
  const lat=readings.reduce((a,b)=>a.time>b.time?a:b);
  const worst=readings.filter(r=>r.time===lat.time).reduce((a,b)=>a.aqi>b.aqi?a:b);
  return{aqi:worst.aqi,param:worst.parameter};
}

function findWindForTime(ms){
  if(!windData?.hourly?.length) return null;
  let best=null, bestDiff=Infinity;
  for(const w of windData.hourly){
    const t=new Date(w.time+'Z').getTime();
    const diff=Math.abs(t-ms);
    if(diff<bestDiff){bestDiff=diff;best=w;}
  }
  return bestDiff < 90*60*1000 ? best : null;
}

let _seq=0;
function chart(readings,p){
  const slots=bucket(readings,p), n=slots.length;
  const W=300, H=102, pt=14, pb=22, pl=2, pr=2;
  const cw=W-pl-pr, ch=H-pt-pb;
  const bs=cw/n, bw=bs*.74;
  const id=_seq++;

  let grid='';
  for(const lvl of[50,100,150]){
    const y=(pt+ch-(lvl/200)*ch).toFixed(1);
    grid+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="rgba(255,255,255,.055)" stroke-width=".5" stroke-dasharray="3,2"/>`;
  }

  const gid=`g${id}`;
  const defs=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="white" stop-opacity=".24"/>
    <stop offset="40%" stop-color="white" stop-opacity=".06"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient></defs>`;

  let lblAt;
  if(p==='24h') lblAt=new Set([0,4,8,12,16,20,23]);
  else if(p==='3d') lblAt=new Set([0,2,4,6,8,11]);
  else lblAt=new Set([0,1,2,3,4,5,6]);

  let bars='', lbls='', windArrows='';
  slots.forEach((s,i)=>{
    const x=(pl+i*bs+(bs-bw)/2).toFixed(1);
    const cx=pl+i*bs+bs/2;

    if(s.max!==null){
      const bh=Math.min((s.max/200)*ch,ch).toFixed(1);
      const y=(pt+ch-parseFloat(bh)).toFixed(1);
      const col=aqiColor(s.max);
      const mid=s.start+(s.end-s.start)/2;
      // Wind info for tooltip
      const wnd=p==='24h'?findWindForTime(mid):null;
      const windTip=wnd?` · Wind ${wnd.compass} ${wnd.speedMph}mph`:'';
      const tip=`AQI ${s.max}  ·  ${aqiLabel(s.max)}  ·  ${slotLabel(mid,p,true)}${windTip}`;
      bars+=`<rect x="${x}" y="${y}" width="${bw.toFixed(1)}" height="${bh}" fill="${col}" rx="2.5" data-tip="${tip}"/>`;
      bars+=`<rect x="${x}" y="${y}" width="${bw.toFixed(1)}" height="${bh}" fill="url(#${gid})" rx="2.5" pointer-events="none"/>`;

      // Wind arrow above bar (24h view only)
      if(p==='24h' && wnd){
        const thick=wnd.speedMph>20?1.8:wnd.speedMph>10?1.4:1.1;
        const opacity=Math.min(0.85, 0.35+wnd.speedMph/45);
        const arrowLen=5.5;
        windArrows+=`<g transform="translate(${cx.toFixed(1)},7) rotate(${wnd.dir})" pointer-events="none">
          <line x1="0" y1="${(arrowLen/2).toFixed(1)}" x2="0" y2="${(-arrowLen/2).toFixed(1)}" stroke="rgba(34,211,238,${opacity.toFixed(2)})" stroke-width="${thick}" stroke-linecap="round"/>
          <polygon points="0,${(-arrowLen/2-2.8).toFixed(1)} ${(-1.7).toFixed(1)},${(-arrowLen/2+1.2).toFixed(1)} ${(1.7).toFixed(1)},${(-arrowLen/2+1.2).toFixed(1)}" fill="rgba(34,211,238,${opacity.toFixed(2)})"/>
        </g>`;
      }
    } else {
      bars+=`<rect x="${x}" y="${(pt+ch-2).toFixed(1)}" width="${bw.toFixed(1)}" height="2" fill="rgba(255,255,255,.07)" rx="1"/>`;
    }
    if(lblAt.has(i)){
      const lx=(pl+i*bs+bs/2).toFixed(1);
      lbls+=`<text x="${lx}" y="${(H-5).toFixed(1)}" text-anchor="middle" fill="rgba(255,255,255,.28)" font-size="6.5" font-family="system-ui,sans-serif">${slotLabel(s.start,p)}</text>`;
    }
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%">${defs}${grid}${bars}${windArrows}${lbls}</svg>`;
}

function card(st){
  const{aqi,param}=latestAQI(st.readings);
  const col=aqi?aqiColor(aqi):'rgba(255,255,255,.28)';
  const lbl=aqi?aqiLabel(aqi):'—';
  const dist=st.distMi<2?'📍 Primary Station':`${st.distMi} mi from Flagstaff`;
  const badge=st.source==='purpleair'
    ?'<span class="badge badge-pa">Community</span>'
    :'<span class="badge badge-epa">EPA</span>';
  return`<div class="card">
    <div class="card-header">
      <div>
        <div class="station-name">${st.name}</div>
        <div class="station-meta">${badge}<span class="station-dist">${dist}</span></div>
      </div>
      <div class="aqi-now">
        <div class="aqi-num" style="color:${col}">${aqi??'—'}</div>
        <div class="aqi-lbl" style="color:${col}">${lbl}</div>
        ${param?`<div class="aqi-param">${param}</div>`:''}
      </div>
    </div>
    <div class="chart-wrap">${chart(st.readings,period)}</div>
  </div>`;
}

// ── Best Place to Run ──────────────────────────────────────────────────────────
function updateBestRunBox(stations){
  const box=document.getElementById('best-run-box');
  const paStations=stations.filter(s=>s.source==='purpleair');
  if(!paStations.length){box.style.display='none';return;}
  let best=null, bestAQI=Infinity;
  for(const st of paStations){
    const{aqi}=latestAQI(st.readings);
    if(aqi!=null && aqi<bestAQI){bestAQI=aqi;best=st;}
  }
  if(!best){box.style.display='none';return;}
  box.style.display='block';
  const col=aqiColor(bestAQI);
  const distStr=best.distMi>1?` · ${best.distMi} mi from Flagstaff`:'';
  document.getElementById('best-run-name').textContent=best.name+distStr;
  const num=document.getElementById('best-run-num');
  const lbl=document.getElementById('best-run-lbl');
  num.textContent=bestAQI; num.style.color=col;
  lbl.textContent=aqiLabel(bestAQI); lbl.style.color=col;
}

// ── Map ──────────────────────────────────────────────────────────────────────
function initLeaflet(){
  if(leafletMap) return;
  leafletMap=L.map('mapbox',{zoomControl:true,attributionControl:true}).setView(FLAGSTAFF,10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#666">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions" style="color:#666">CartoDB</a>',
    subdomains:'abcd', maxZoom:16,
  }).addTo(leafletMap);
}

function renderMap(data){
  initLeaflet();
  markers.forEach(m=>m.remove());
  markers=[];
  const bounds=[];

  // AQI station markers
  for(const st of data.stations){
    const{aqi}=latestAQI(st.readings);
    if(!st.lat||!st.lon) continue;
    const col=aqi?aqiColor(aqi):'#555';
    const lbl=aqi?aqiLabel(aqi):'No data';
    const srcLabel=st.source==='purpleair'?'Community Sensor':'EPA Monitor';
    const distStr=st.distMi<2?'Flagstaff (primary)':`${st.distMi} mi from Flagstaff`;
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:42px;height:42px;border-radius:50%;background:${col};
        border:2.5px solid rgba(255,255,255,.75);display:flex;align-items:center;
        justify-content:center;font-size:11px;font-weight:700;color:#fff;
        box-shadow:0 2px 14px ${col}80,0 0 0 5px ${col}22;cursor:pointer;">${aqi??'?'}</div>`,
      iconSize:[42,42], iconAnchor:[21,21], popupAnchor:[0,-24],
    });
    const popup=`<div class="mp-name">${st.name}</div>
      <div class="mp-aqi" style="color:${col}">${aqi??'—'}</div>
      <div class="mp-label" style="color:${col}">${lbl}</div>
      <div class="mp-meta">${srcLabel} &middot; ${distStr}</div>`;
    const m=L.marker([st.lat,st.lon],{icon}).bindPopup(popup,{maxWidth:220});
    m.addTo(leafletMap);
    markers.push(m);
    bounds.push([st.lat,st.lon]);
  }

  // Friend markers
  for(const f of FRIENDS){
    const personSVG=`<svg width="15" height="15" viewBox="0 0 15 15" fill="white">
      <circle cx="7.5" cy="4" r="2.5"/>
      <path d="M2 13.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>`;
    const icon=L.divIcon({
      className:'',
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="width:34px;height:34px;border-radius:50%;background:${f.color};border:2.5px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px ${f.color}99,0 0 0 4px ${f.color}28;">${personSVG}</div>
        <div style="background:rgba(7,6,26,.92);border:1px solid ${f.color}66;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:700;color:${f.color};white-space:nowrap;letter-spacing:.3px;">${f.name}</div>
      </div>`,
      iconSize:[34,56], iconAnchor:[17,56], popupAnchor:[0,-58],
    });
    const m=L.marker([f.lat,f.lon],{icon,zIndexOffset:1000})
      .bindPopup(`<div class="mp-name" style="color:${f.color}">${f.name}</div><div class="mp-meta">Home location</div>`,{maxWidth:160});
    m.addTo(leafletMap);
    markers.push(m);
    bounds.push([f.lat,f.lon]);
  }



  if(bounds.length) leafletMap.fitBounds(bounds,{padding:[50,50],maxZoom:12});
  setTimeout(()=>leafletMap.invalidateSize(),50);
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tip=document.getElementById('tip');
document.addEventListener('mousemove',e=>{
  const el=e.target;
  if(el.dataset&&el.dataset.tip){
    tip.textContent=el.dataset.tip;
    tip.style.display='block';
    const tx=Math.min(e.clientX+14,window.innerWidth-tip.offsetWidth-8);
    tip.style.left=tx+'px';
    tip.style.top=(e.clientY-38)+'px';
  } else {
    tip.style.display='none';
  }
});

// ── Refresh ───────────────────────────────────────────────────────────────────
function refreshData(){
  Object.keys(cache).forEach(k=>delete cache[k]);
  windData=null;
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),650);
  load(period);
}

// ── Load / Render ─────────────────────────────────────────────────────────────
async function load(p){
  if(cache[p]){render(cache[p]);return;}
  const lbl=p==='24h'?'24-hour':p==='3d'?'3-day':'7-day';
  document.getElementById('grid').innerHTML=`<div class="state-box"><div class="spinner"></div><span>Loading ${lbl} data&hellip;</span></div>`;
  document.getElementById('legend').style.display='none';
  try{
    const res=await fetch(`${FN}?period=${p}`,{headers:{Authorization:`Bearer ${KEY}`}});
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    cache[p]=data;
    render(data);
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="err-box">&#x26A0;&#xFE0F; ${e.message}</div>`;
  }
}

function render(data){
  const ts=new Date(data.timestamp).toLocaleString('en-US',{
    month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Phoenix'
  });
  document.getElementById('updated').textContent=`Updated ${ts} MST`;
  if(data.wind) windData=data.wind;
  if(!data.stations?.length){
    document.getElementById('grid').innerHTML=`<div class="err-box">No station data found.</div>`;
    return;
  }
  // Filter out non-working sensors: no readings or all-null buckets in current period
  const activeStations=data.stations.filter(st=>{
    if(!st.readings?.length) return false;
    const {aqi}=latestAQI(st.readings);
    if(!aqi || aqi<=0) return false;
    return bucket(st.readings,period).some(s=>s.max!==null);
  });
  const activeData={...data, stations:activeStations};
  document.getElementById('map-loading').style.display='none';
  if(view==='map'){
    updateBestRunBox(data.stations);
    renderMap(activeData);
  } else {
    document.getElementById('best-run-box').style.display='none';
    document.getElementById('grid').innerHTML=activeStations.map(card).join('');
    document.getElementById('legend').style.display='flex';
  }
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.querySelectorAll('[data-period]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-period]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    period=btn.dataset.period;
    load(period);
  });
});

document.querySelectorAll('[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-view]').forEach(b=>b.classList.remove('view-active'));
    btn.classList.add('view-active');
    view=btn.dataset.view;
    const isMap=view==='map';
    document.getElementById('grid').style.display=isMap?'none':'grid';
    document.getElementById('mapbox').classList.toggle('active',isMap);
    document.getElementById('legend').style.display=isMap?'none':(cache[period]?.stations?.length?'flex':'none');
    document.getElementById('period-group').style.opacity=isMap?'.4':'1';
    document.getElementById('period-group').style.pointerEvents=isMap?'none':'auto';
    if(isMap){
      document.getElementById('best-run-box').style.display='block';
      if(cache[period]) {
        const active=cache[period].stations.filter(st=>{
          if(!st.readings?.length) return false;
          const {aqi}=latestAQI(st.readings);
          if(!aqi||aqi<=0) return false;
          return bucket(st.readings,period).some(s=>s.max!==null);
        });
        updateBestRunBox(cache[period].stations);
        renderMap({...cache[period],stations:active});
      }
    } else {
      document.getElementById('best-run-box').style.display='none';
    }
  });
});

load(period);
</script>
